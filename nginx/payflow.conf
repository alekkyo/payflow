# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name payflow.alexkua.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name payflow.alexkua.com;

    ssl_certificate     /etc/letsencrypt/live/payflow.alexkua.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/payflow.alexkua.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;

    # React frontend — built static files
    root /var/www/payflow/frontend/dist;
    index index.html;

    # SPA fallback: any path that doesn't match a real file goes to index.html
    # so React Router can handle client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/* → Go API (strips the /api prefix so routes match as-is)
    # e.g. /api/orders → http://127.0.0.1:8080/orders
    location /api/ {
        proxy_pass         http://127.0.0.1:8080/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE (Server-Sent Events) requires buffering to be disabled, otherwise
        # Nginx holds the response in memory and the browser never sees the events.
        proxy_buffering    off;
        proxy_cache        off;
        proxy_set_header   Connection '';

        # Long timeout for SSE connections (order status streams stay open until terminal state)
        proxy_read_timeout 3600s;
    }
}
